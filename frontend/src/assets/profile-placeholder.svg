<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Profile placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00f5ff" stop-opacity="0.22" />
      <stop offset="0.5" stop-color="#7c3aed" stop-opacity="0.22" />
      <stop offset="1" stop-color="#f72585" stop-opacity="0.22" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="65%">
      <stop offset="0" stop-color="#00f5ff" stop-opacity="0.35" />
      <stop offset="1" stop-color="#030712" stop-opacity="1" />
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" />
    </filter>
  </defs>

  <rect width="512" height="512" fill="#030712" />
  <circle cx="256" cy="256" r="240" fill="url(#glow)" />
  <circle cx="256" cy="256" r="210" fill="url(#bg)" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="#00f5ff" stroke-opacity="0.25" stroke-width="3" />

  <g filter="url(#soft)">
    <circle cx="160" cy="150" r="36" fill="#00f5ff" fill-opacity="0.18" />
    <circle cx="360" cy="340" r="46" fill="#7c3aed" fill-opacity="0.16" />
    <circle cx="350" cy="170" r="22" fill="#f72585" fill-opacity="0.18" />
  </g>

  <text x="50%" y="54%" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="116" font-weight="700" fill="#f8fafc" fill-opacity="0.92">
    IP
  </text>
  <text x="50%" y="67%" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="22" fill="#94a3b8" fill-opacity="0.9">
    profile
  </text>
</svg>
